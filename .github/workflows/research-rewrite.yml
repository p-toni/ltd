name: research-rewrite

on:
  issues:
    types: [labeled]

jobs:
  rewrite:
    if: github.event.label.name == 'rewrite'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: read
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: 10.10.0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run rewrite flow
        env:
          LLM_PROVIDER: ${{ secrets.LLM_PROVIDER }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          BRAVE_API_KEY: ${{ secrets.BRAVE_API_KEY }}
        run: pnpm research:rewrite

      - name: Create pull request
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.REPO_PAT }}
          commit-message: 'Rewrite proposal'
          title: 'Rewrite proposal'
          body: 'Automated rewrite proposal from labeled issue.'
          labels: rewrite
          branch: codex/research-rewrite
          add-paths: |
            content/pieces
            content/proposals
            content/research-plans
