name: research-daily

on:
  schedule:
    - cron: '0 14 * * *'
  workflow_dispatch:

jobs:
  research:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: 10.10.0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run research swarm
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          BRAVE_API_KEY: ${{ secrets.BRAVE_API_KEY }}
        run: pnpm research:daily

      - name: Create pull request
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: 'Research updates'
          title: 'Research updates'
          body: 'Automated research updates.'
          labels: research-update
          branch: codex/research-daily
          add-paths: |
            content/pieces
            content/proposals
            content/research-plans
            public/research/status.json
